version: 1
disable_existing_loggers: true

formatters:
  standard:
    format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

handlers:
  console:
    class: logging.StreamHandler
    level: DEBUG
    formatter: standard
    stream: ext://sys.stdout

#  file_handler:
#    class: logging.handlers.TimedRotatingFileHandler
#    level: DEBUG
#    formatter: standard
#    filename: /data/logging.log
#    when: midnight
#    interval: 1
#    backupCount: 0
#    encoding: utf8

loggers:
  runner:
    level: DEBUG
    handlers: [console]
    propagate: no
  synthesizer:
    level: DEBUG
    handlers: [console]
    propagate: no

root:
  level: DEBUG
  handlers: [console]
  propagate: no
