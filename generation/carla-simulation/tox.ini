[tox]
envlist =
    py38-lint

[testenv:lint]
basepython = python3.8
description = Run linting tools (black, isort, flake8)
skip_install = true
deps =
    black
    isort
    flake8
commands =
    black ./src
    isort ./src
    flake8 ./src

[flake8]
max-line-length = 120
ignore = E731, W503, E203
exclude = .venv
